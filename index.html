<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/portfolio-data-collector/icon-192.svg" />
    <link rel="apple-touch-icon" href="/portfolio-data-collector/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Professional portfolio data collection app" />
    <link rel="manifest" href="/portfolio-data-collector/manifest.json" />
    <title>Portfolio Data Collector</title>
    <meta property="og:title" content="Portfolio Data Collector" />
    <meta property="og:description" content="Professional portfolio data collection app" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourusername.github.io/portfolio-data-collector/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/portfolio-data-collector/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((error) => {
              console.log('SW registration failed: ', error);
            });
        });
      }
    </script>
  </body>
</html>
